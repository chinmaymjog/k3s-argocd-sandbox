---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-scripts
data:
  init-databases.sh: |
    #!/bin/bash
    set -e
    create_user_and_database() {
      local database=$1
      local user=$2
      local password=$3
      echo "  Ensuring MySQL database '$database' and user '$user' exist..."
      mysql -u root -p"${MYSQL_ROOT_PASSWORD}" <<-EOSQL
        CREATE DATABASE IF NOT EXISTS \`$database\`;
        CREATE USER IF NOT EXISTS '$user'@'%' IDENTIFIED BY '$password';
        ALTER USER '$user'@'%' IDENTIFIED BY '$password';
        GRANT ALL PRIVILEGES ON \`$database\`.* TO '$user'@'%';
        FLUSH PRIVILEGES;
    EOSQL
    }
    echo "🚀 Starting MySQL database initialization..."
    # Add app-specific MySQL databases and users here when needed.
    echo "✅ MySQL database initialization complete!"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sandbox-secrets
                  key: MYSQL_ROOT_PASSWORD
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: mysql-init
              mountPath: /docker-entrypoint-initdb.d/init-databases.sh
              subPath: init-databases.sh
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-pvc
        - name: mysql-init
          configMap:
            name: mysql-init-scripts
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
