apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sandbox-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/chinmaymjog/k3s-argocd-sandbox.git'
    targetRevision: HEAD
    path: apps
    directory:
      recurse: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
